<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muniyasamy Laundry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}

body{background:#f5f7fa;overflow-x:hidden;}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.loader-circle{
  width:60px;height:60px;
  border:6px solid #eee;
  border-top:6px solid #0077ff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* NAV */
nav{display:flex;justify-content:space-between;padding:15px 30px;background:#fff;position:sticky;top:0;}
nav h2{color:#0077ff;}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0077ff,#00c6ff);
  color:white;text-align:center;
}

/* SECTIONS */
section{padding:70px 20px;text-align:center;}

.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.card{
  width:250px;
  padding:20px;
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* GALLERY */
.gallery img{
  width:300px;
  border-radius:15px;
  transition:0.3s;
}
.gallery img:hover{transform:scale(1.05);}

/* PRICING */
.price-card{
  padding:20px;
  border-radius:15px;
  background:#0077ff;
  color:white;
  width:250px;
}

/* FORM */
form input,form textarea{
  width:90%;
  padding:10px;
  margin:10px;
}
button{
  padding:10px 20px;
  background:#0077ff;
  color:white;
  border:none;
}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;
padding:15px;border-radius:50%;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><div class="loader-circle"></div></div>

<nav>
<h2>Muniyasamy Laundry</h2>
</nav>

<section class="hero">
<h1 data-aos="fade-up">Premium Laundry Service</h1>
<p data-aos="fade-up">Fast Delivery | Best Quality</p>
</section>

<!-- SERVICES -->
<section>
<h2 data-aos="fade-up">Services</h2>
<div class="cards">

<div class="card" data-aos="zoom-in">
<h3>Wash & Fold</h3>
</div>

<div class="card" data-aos="zoom-in">
<h3>Dry Cleaning</h3>
</div>

<div class="card" data-aos="zoom-in">
<h3>Ironing</h3>
</div>

</div>
</section>

<!-- GALLERY -->
<section class="gallery">
<h2 data-aos="fade-up">Our Work</h2>

<img src="https://images.unsplash.com/photo-1581579186913-45acde6c7d64" data-aos="fade-up">
<img src="https://images.unsplash.com/photo-1604335399105-a0c585fd81a0" data-aos="fade-up">
<img src="https://images.unsplash.com/photo-1616628182506-60a7ed2dbe64" data-aos="fade-up">

</section>

<!-- PRICING -->
<section>
<h2 data-aos="fade-up">Pricing & Offers</h2>

<div class="cards">

<div class="price-card" data-aos="flip-left">
<h3>Basic</h3>
<p>₹99 / kg</p>
<p>✔ Wash & Fold</p>
</div>

<div class="price-card" data-aos="flip-left">
<h3>Premium</h3>
<p>₹149 / kg</p>
<p>✔ Dry Cleaning</p>
</div>

<div class="price-card" data-aos="flip-left">
<h3>Offer</h3>
<p>🎉 20% OFF First Order</p>
</div>

</div>
</section>

<!-- BOOKING FORM -->
<section>
<h2 data-aos="fade-up">Book Now</h2>

<form onsubmit="sendWhatsApp(event)">
<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<textarea id="address" placeholder="Address"></textarea>
<button type="submit">Book via WhatsApp</button>
</form>

</section>

<a href="https://wa.me/919843911292" class="whatsapp">💬</a>

<!-- JS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();

/* LOADER */
window.onload=function(){
 document.getElementById("loader").style.display="none";
}

/* WHATSAPP FORM */
function sendWhatsApp(e){
 e.preventDefault();
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;
 let address=document.getElementById("address").value;

 let msg=`Name: ${name}%0APhone: ${phone}%0AAddress: ${address}`;
 window.open(`https://wa.me/919843911292?text=${msg}`);
}
</script>

</body>
</html>
